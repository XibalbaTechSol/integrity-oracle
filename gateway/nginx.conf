# Xibalba Solutions: Institutional API Gateway (v1.0)
# mTLS Termination & Security Hardening for Integrity Protocol Oracle

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main_mtls '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'mtls_verify=$ssl_client_verify mtls_dn="$ssl_client_s_dn"';

    access_log /var/log/nginx/access.log main_mtls;

    sendfile on;
    keepalive_timeout 65;

    upstream oracle_backend {
        server api:8080;
    }

    server {
        listen 443 ssl;
        server_name oracle.xibalba.solutions;

        # Server Certificates
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Mutual TLS Configuration
        ssl_client_certificate /etc/nginx/certs/ca.crt;
        ssl_verify_client on; # Mandatory mTLS
        ssl_verify_depth 2;

        # SSL Hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        location / {
            proxy_pass http://oracle_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass mTLS identity to the backend
            proxy_set_header X-Client-Verify $ssl_client_verify;
            proxy_set_header X-Client-S-DN $ssl_client_s_dn;
            proxy_set_header X-Client-I-DN $ssl_client_i_dn;
            proxy_set_header X-Client-Serial $ssl_client_serial;
        }

        # Health check bypass for mTLS (optional, depending on load balancer)
        location /health {
            auth_basic off;
            ssl_verify_client off;
            proxy_pass http://oracle_backend/health;
        }
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name oracle.xibalba.solutions;
        return 301 https://$host$request_uri;
    }
}
